<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Planner - Elbi GradeSim</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="planner.css">
</head>
<body class="planner-page">
  <div class="planner-full-container">
    <header>
      <h1><a href="https://gradesim.stimmie.dev" target="_blank" style="color: inherit; text-decoration: none;">Elbi GradeSim Course Planner</a></h1>
    </header>
    <div class="planner-header">
      <p class="hint">
        Arrows indicate prerequisites. 
        <span class="planner-completed-legend"></span> Passed 
        <span class="planner-locked-legend"></span> Locked 
        <span class="planner-failed-legend" style="display:inline-block; width:12px; height:12px; background:rgba(220,53,69,0.2); border:1px solid #dc3545; margin-left:10px; margin-right:4px;"></span> Failed
      </p>
      <p class="hint" style="margin-top: 8px; color: var(--info);">
        <strong>Pro Tip:</strong> 🖱️ Drag and drop courses to plan your schedule. Right-click any course to toggle its status (Passed -> Failed -> Planned). Courses scheduled before their prerequisites will glow <strong style="color: #ff4444;">red</strong>.
      </p>
    </div>
    <div class="planner-scroll-wrapper" id="plannerScrollWrapper">
      <svg id="plannerArrows" class="planner-arrows"></svg>
      <div id="plannerGrid" class="planner-grid">
        <!-- Semesters and courses injected here -->
      </div>
    </div>
  </div>
  <script src="curriculum.js"></script>
  <script src="planner.js"></script>
</body>
</html>
